<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffff00;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 10px;
            border-radius: 6.px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }

        .input-group { margin-bottom: 6px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 5px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 11px;
        }

        button {
            width: 100%;
            padding: 6.px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        .totals {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            text-align: center;
        }

        .total-card {
            background: #eff6ff;
            padding: 5opx;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .total-card span { display: block; font-weight: bold; color: var(--primary); }

        canvas { margin-top: 15px; max-width: 100%; }

        .reset-btn {
            background-color: #ef4444;
            margin-top: 10px;
            font-size: 11px;
            padding: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Em Caixa</h1>

    <div class="input-group">
        <label>Valor A (€)</label>
        <input type="number" id="valA" step="0.01" inputmode="decimal" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>Valor B (€)</label>
        <input type="number" id="valB" step="0.01" inputmode="decimal" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>Valor C (€)</label>
        <input type="number" id="valC" step="0.01" inputmode="decimal" placeholder="0.00">
    </div>

    <button onclick="registrar()">Registrar Valores</button>

    <div class="totals">
        <div class="total-card">Total VA<span id="tA">0.00€</span></div>
        <div class="total-card">Total VB<span id="tB">0.00€</span></div>
        <div class="total-card">Total VC<span id="tC">0.00€</span></div>
    </div>

    <canvas id="meuGrafico"></canvas>

    <button class="reset-btn" onclick="limparDados()">Limpar Histórico</button>
</div>

<script>
    let historico = JSON.parse(localStorage.getItem('emCaixaData')) || [];
    let meuGrafico;

    function registrar() {
        const vA = parseFloat(document.getElementById('valA').value) || 0;
        const vB = parseFloat(document.getElementById('valB').value) || 0;
        const vC = parseFloat(document.getElementById('valC').value) || 0;

        const agora = new Date();
        const dataFormatada = agora.getFullYear() + '/' + 
                             String(agora.getMonth() + 1).padStart(2, '0') + '/' + 
                             String(agora.getDate()).padStart(2, '0');
        const horaFormatada = agora.toLocaleTimeString('pt-PT');

        const novoRegisto = {
            data: `${dataFormatada} ${horaFormatada}`,
            a: vA,
            b: vB,
            c: vC
        };

        historico.push(novoRegisto);
        localStorage.setItem('emCaixaData', JSON.stringify(historico));
        
        // Limpar inputs
        document.querySelectorAll('input').forEach(i => i.value = '');
        
        atualizarInterface();
    }

    function atualizarInterface() {
        let totalA = 0, totalB = 0, totalC = 0;
        let acumuladosA = [], acumuladosB = [], acumuladosC = [], labels = [];

        historico.forEach(reg => {
            totalA += reg.a;
            totalB += reg.b;
            totalC += reg.c;
            
            labels.push(reg.data);
            acumuladosA.push(totalA);
            acumuladosB.push(totalB);
            acumuladosC.push(totalC);
        });

        document.getElementById('tA').innerText = totalA.toFixed(2) + '€';
        document.getElementById('tB').innerText = totalB.toFixed(2) + '€';
        document.getElementById('tC').innerText = totalC.toFixed(2) + '€';

        renderizarGrafico(labels, acumuladosA, acumuladosB, acumuladosC);
    }

    function renderizarGrafico(labels, da, db, dc) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        
        if (meuGrafico) { meuGrafico.destroy(); }

        meuGrafico = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Total A', data: da, borderColor: '#2563eb', tension: 0.1 },
                    { label: 'Total B', data: db, borderColor: '#10b981', tension: 0.1 },
                    { label: 'Total C', data: dc, borderColor: '#f59e0b', tension: 0.1 }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: false,
                        ticks: { callback: value => value + '€' }
                    },
                    x: { ticks: { maxRotation: 45, minRotation: 45 } }
                }
            }
        });
    }

    function limparDados() {
        if(confirm("Deseja apagar todo o histórico?")) {
            historico = [];
            localStorage.removeItem('emCaixaData');
            atualizarInterface();
        }
    }

    // Inicializar ao carregar
    atualizarInterface();
</script>

</body>
</html>
